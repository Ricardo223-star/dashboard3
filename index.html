<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI PANEL V2</title>

<style>
body {
  background:#0f1117;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

h1 { color:#f0c040; }

.card {
  background:#1a1d2e;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#f0c040;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>📊 MI PANEL V2</h1>

<div class="card">
  <h3>🌤 Clima Buenos Aires</h3>
  <div id="clima">Cargando...</div>
</div>

<div class="card">
  <h3>💰 Cripto</h3>
  <div id="crypto">Cargando...</div>
</div>

<div class="card">
  <h3>💵 Dólar</h3>
  <div id="dolar">Cargando...</div>
</div>

<div class="card">
  <h3>📊 Inflación</h3>
  <div id="inflacion">Cargando...</div>
</div>

<button onclick="cargarTodo()">🔄 Actualizar</button>

<script>

async function cargarClima(){
  try{
    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-34.6&longitude=-58.38&current=temperature_2m");
    const d = await r.json();
    document.getElementById("clima").innerText = d.current.temperature_2m + "°C";
  }catch{
    document.getElementById("clima").innerText = "Error";
  }
}

async function cargarCrypto(){
  try{
    const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
    const d = await r.json();
    document.getElementById("crypto").innerText =
      "BTC $" + d.bitcoin.usd + " | ETH $" + d.ethereum.usd;
  }catch{
    document.getElementById("crypto").innerText = "Error";
  }
}

async function cargarDolar(){
  try{
    const r = await fetch("https://dolarapi.com/v1/dolares");
    const d = await r.json();
    const blue = d.find(x=>x.casa==="blue");
    document.getElementById("dolar").innerText =
      "Blue $" + blue.venta;
  }catch{
    document.getElementById("dolar").innerText = "Error";
  }
}

async function cargarInflacion(){
  try{
    const r = await fetch("https://api.bcra.gob.ar/estadisticas/v2.0/datosvariable/27/2024-01-01/2026-01-01");
    const d = await r.json();
    const ult = d.results[d.results.length-1];
    document.getElementById("inflacion").innerText =
      ult.valor + "% mensual";
  }catch{
    document.getElementById("inflacion").innerText = "No disponible";
  }
}

function cargarTodo(){
  cargarClima();
  cargarCrypto();
  cargarDolar();
  cargarInflacion();
}

cargarTodo();

</script>

</body>
</html>
